{% set python_min = "3.11" %}
{% set name = "nionswift-video-capture" %}
{% set version = "2.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: efdcd05dcb8fde69157e5b001eceebf0b10df7da34752e9686da8f0f6c8da0c7

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - nionswift >=16.12,<17.0
    - nionswift-instrumentation >=23.1,<24.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - nionswift_plugin.nionswift_video_capture

about:
  home: https://github.com/nion-software/nionswift-video-capture
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Capture video from built-in camera using OpenCV.
  dev_url: https://github.com/nion-software/nionswift-video-capture

extra:
  recipe-maintainers:
    - cmeyer
    - nion-gwyn
